<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ivy Decision Spinner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cinzel:wght@500;700&family=Spectral:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header>
        <p class="eyebrow">Class of 2030</p>
        <h1>Ivy League Decision Spinner</h1>
        <p class="subhead">Spin to see which portal you open first. Then reveal your decision.</p>
        <div id="ivyLogoStrip" class="ivy-logo-strip" aria-label="Ivy League logos"></div>
      </header>

      <section class="spinner-layout" aria-label="Ivy spinner">
        <div class="wheel-wrap">
          <div class="pointer" aria-hidden="true"></div>
          <div id="wheel" class="wheel"></div>
          <div class="hub" aria-hidden="true">Ivy</div>
        </div>

        <div class="controls">
          <button id="spinBtn" class="btn btn-primary">Spin Wheel</button>
          <button id="revealBtn" class="btn btn-secondary" disabled>Open Decision</button>
          <button id="resetBtn" class="btn btn-ghost">Reset</button>
        </div>
      </section>

      <section class="result-card" id="resultCard" aria-live="polite">
        <p class="result-label">Selected School</p>
        <div class="selected-school">
          <img id="schoolLogo" class="school-logo school-logo-hidden" alt="" />
          <h2 id="schoolResult">Waiting for spin...</h2>
        </div>
        <p class="result-label">Decision</p>
        <h3 id="decisionResult">Hidden</h3>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
